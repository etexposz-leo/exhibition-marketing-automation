# Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: exhibition-marketing-automation
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      mkdir -p data
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/auth/check
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./data/marketing.db
      - key: PYTHON_VERSION
        value: "3.11"
      - key: HTTPS_ONLY
        value: "false"
