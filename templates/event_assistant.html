<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event AI Assistant | BoothOS</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    {% include 'components/nav.html' %}
    
    <div class="main-wrapper">
        <header class="main-header">
            <div class="header-with-back">
                <a href="/events/{{ event_id }}" class="back-link">← Back to Event</a>
                <h1 class="page-title">🤖 Event AI Assistant</h1>
            </div>
            <p class="page-subtitle">Ask questions about your event documents</p>
        </header>
        
        <main class="main-content">
            <div class="assistant-container">
                <div class="chat-section">
                    <div class="chat-messages" id="chatMessages">
                        <div class="welcome-message">
                            <div class="welcome-icon">🤖</div>
                            <h3>Welcome to Event AI Assistant</h3>
                            <p>I've analyzed all documents uploaded to this event. Ask me anything about:</p>
                            <ul class="suggested-questions">
                                <li><button onclick="askQuestion('What is the maximum booth height?')">What is the maximum booth height?</button></li>
                                <li><button onclick="askQuestion('Can I suspend a banner from the ceiling?')">Can I suspend a banner from the ceiling?</button></li>
                                <li><button onclick="askQuestion('What are the electrical requirements?')">What are the electrical requirements?</button></li>
                                <li><button onclick="askQuestion('What are the move-in dates and times?')">What are the move-in dates and times?</button></li>
                                <li><button onclick="askQuestion('What are the fire safety regulations?')">What are the fire safety regulations?</button></li>
                            </ul>
                        </div>
                    </div>
                    
                    <div class="chat-input-area">
                        <div class="chat-input-wrapper">
                            <input type="text" id="questionInput" placeholder="Ask a question about your event..." onkeypress="handleKeyPress(event)">
                            <button class="send-btn" onclick="sendQuestion()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                    <line x1="22" y1="2" x2="11" y2="13"/>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="sources-section" id="sourcesSection" style="display: none;">
                    <h3>Sources</h3>
                    <div class="sources-list" id="sourcesList"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const eventId = {{ event_id }};
        let queries = [];
        let isLoading = false;
        
        async function loadHistory() {
            try {
                const response = await fetch(`/api/events/${eventId}/queries`);
                if (response.ok) {
                    queries = await response.json();
                    if (queries.length > 0) {
                        renderWelcomeMessage();
                    }
                }
            } catch (e) {
                console.error('Error loading history:', e);
            }
        }
        
        function renderWelcomeMessage() {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = `
                <div class="welcome-message">
                    <div class="welcome-icon">🤖</div>
                    <h3>Welcome to Event AI Assistant</h3>
                    <p>I've analyzed all documents uploaded to this event. Ask me anything about:</p>
                    <ul class="suggested-questions">
                        <li><button onclick="askQuestion('What is the maximum booth height?')">What is the maximum booth height?</button></li>
                        <li><button onclick="askQuestion('Can I suspend a banner from the ceiling?')">Can I suspend a banner from the ceiling?</button></li>
                        <li><button onclick="askQuestion('What are the electrical requirements?')">What are the electrical requirements?</button></li>
                        <li><button onclick="askQuestion('What are the move-in dates and times?')">What are the move-in dates and times?</button></li>
                        <li><button onclick="askQuestion('What are the fire safety regulations?')">What are the fire safety regulations?</button></li>
                    </ul>
                </div>
            `;
        }
        
        function askQuestion(question) {
            document.getElementById('questionInput').value = question;
            sendQuestion();
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendQuestion();
            }
        }
        
        async function sendQuestion() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            
            if (!question || isLoading) return;
            
            isLoading = true;
            input.value = '';
            
            // Add user message
            addMessage('user', question);
            
            // Add loading indicator
            const loadingId = addLoadingIndicator();
            
            try {
                const response = await fetch(`/api/events/${eventId}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ 
                        question: question,
                        provider: 'mock'
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Query failed');
                }
                
                const result = await response.json();
                queries.unshift(result);
                
                // Remove loading indicator
                removeLoadingIndicator(loadingId);
                
                // Add assistant response
                addMessage('assistant', result.answer, result.sources, result.provider);
                
                // Show sources
                if (result.sources && result.sources.length > 0) {
                    showSources(result.sources);
                }
                
            } catch (err) {
                console.error('Error sending question:', err);
                removeLoadingIndicator(loadingId);
                addMessage('error', 'Failed to get answer: ' + err.message);
            }
            
            isLoading = false;
        }
        
        function addMessage(type, content, sources = null, provider = null) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;
            
            if (type === 'user') {
                messageDiv.innerHTML = `
                    <div class="message-avatar">👤</div>
                    <div class="message-content">${escapeHtml(content)}</div>
                `;
            } else if (type === 'assistant') {
                let providerBadge = '';
                if (provider) {
                    providerBadge = `<span class="provider-badge">${provider}</span>`;
                }
                messageDiv.innerHTML = `
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        ${providerBadge}
                        <div class="message-text">${formatAnswer(content)}</div>
                        ${sources && sources.length > 0 ? `
                            <div class="message-sources">
                                <span class="sources-toggle" onclick="toggleSources(this)">📑 View Sources (${sources.length})</span>
                                <div class="sources-preview" style="display: none;">
                                    ${sources.map(s => `
                                        <div class="source-preview">
                                            <span class="source-name">${escapeHtml(s.document_title || 'Document')}</span>
                                            <span class="source-chunk">${escapeHtml(s.excerpt?.substring(0, 100))}...</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            } else if (type === 'error') {
                messageDiv.innerHTML = `
                    <div class="message-avatar">⚠️</div>
                    <div class="message-content error-message">${escapeHtml(content)}</div>
                `;
            }
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function addLoadingIndicator() {
            const chatMessages = document.getElementById('chatMessages');
            const id = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message message-assistant';
            loadingDiv.id = id;
            loadingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="loading-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return id;
        }
        
        function removeLoadingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }
        
        function toggleSources(el) {
            const preview = el.nextElementSibling;
            if (preview.style.display === 'none') {
                preview.style.display = 'block';
                el.textContent = '📑 Hide Sources';
            } else {
                preview.style.display = 'none';
                el.textContent = `📑 View Sources (${preview.querySelectorAll('.source-preview').length})`;
            }
        }
        
        function showSources(sources) {
            const section = document.getElementById('sourcesSection');
            const list = document.getElementById('sourcesList');
            
            section.style.display = 'block';
            list.innerHTML = sources.map(s => `
                <div class="source-card">
                    <div class="source-header">
                        <span class="source-title">${escapeHtml(s.document_title || 'Document ' + (s.chunk_index + 1))}</span>
                        <span class="source-relevance">${Math.round((s.relevance || 1) * 100)}%</span>
                    </div>
                    <p class="source-excerpt">${escapeHtml(s.excerpt)}</p>
                </div>
            `).join('');
        }
        
        function formatAnswer(text) {
            // Convert markdown-style formatting to HTML
            return text
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialize
        loadHistory();
    </script>
    
    <style>
        .header-with-back {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .back-link {
            font-size: 0.85rem;
            color: var(--primary);
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .assistant-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1.5rem;
            height: calc(100vh - 180px);
        }
        
        @media (max-width: 1024px) {
            .assistant-container {
                grid-template-columns: 1fr;
                height: auto;
            }
        }
        
        .chat-section {
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--surface-light);
            overflow: hidden;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        
        .welcome-message {
            text-align: center;
            padding: 2rem;
        }
        
        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .welcome-message h3 {
            margin: 0 0 0.5rem;
            font-size: 1.25rem;
        }
        
        .welcome-message p {
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        
        .suggested-questions {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .suggested-questions button {
            background: var(--bg);
            border: 1px solid var(--surface-light);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            text-align: left;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text);
            transition: all 0.2s;
        }
        
        .suggested-questions button:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }
        
        .message {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .message-user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }
        
        .message-user .message-avatar {
            background: var(--primary);
        }
        
        .message-assistant .message-avatar {
            background: var(--surface-light);
        }
        
        .message-content {
            max-width: 75%;
        }
        
        .message-user .message-content {
            background: var(--primary);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 16px 16px 4px 16px;
        }
        
        .message-assistant .message-content {
            background: var(--bg);
            padding: 1rem;
            border-radius: 4px 16px 16px 16px;
            border: 1px solid var(--surface-light);
        }
        
        .message-text {
            line-height: 1.6;
        }
        
        .provider-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--error);
            color: var(--error);
        }
        
        .message-sources {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--surface-light);
        }
        
        .sources-toggle {
            cursor: pointer;
            color: var(--primary);
            font-size: 0.85rem;
        }
        
        .sources-preview {
            margin-top: 0.5rem;
        }
        
        .source-preview {
            background: var(--bg);
            padding: 0.5rem;
            border-radius: 4px;
            margin-top: 0.25rem;
            font-size: 0.8rem;
        }
        
        .source-name {
            font-weight: 600;
            color: var(--text);
            display: block;
        }
        
        .source-chunk {
            color: var(--text-secondary);
        }
        
        .loading-dots {
            display: flex;
            gap: 4px;
        }
        
        .loading-dots span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .chat-input-area {
            padding: 1rem 1.5rem;
            background: var(--bg);
            border-top: 1px solid var(--surface-light);
        }
        
        .chat-input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        
        .chat-input-wrapper input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 0.95rem;
            background: var(--surface);
            color: var(--text);
        }
        
        .chat-input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .send-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }
        
        .sources-section {
            background: var(--surface);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid var(--surface-light);
            overflow-y: auto;
        }
        
        .sources-section h3 {
            margin: 0 0 1rem;
            font-size: 1rem;
        }
        
        .sources-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .source-card {
            background: var(--bg);
            border-radius: 8px;
            padding: 1rem;
            border: 1px solid var(--surface-light);
        }
        
        .source-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        
        .source-title {
            font-weight: 600;
            color: var(--text);
        }
        
        .source-relevance {
            background: var(--success);
            color: white;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .source-excerpt {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
    </style>
</body>
</html>
