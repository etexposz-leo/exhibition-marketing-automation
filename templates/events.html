<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | BoothOS</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    {% include 'components/nav.html' %}
    
    <div class="main-wrapper">
        <header class="main-header">
            <h1 class="page-title">Events</h1>
            <p class="page-subtitle">Manage your exhibition events and venue knowledge</p>
        </header>
        
        <main class="main-content">
            <div class="content-header">
                <div class="stats-row">
                    <div class="stat-mini">
                        <span class="stat-mini-value" id="totalEvents">0</span>
                        <span class="stat-mini-label">Total Events</span>
                    </div>
                    <div class="stat-mini">
                        <span class="stat-mini-value" id="activeEvents">0</span>
                        <span class="stat-mini-label">Active</span>
                    </div>
                    <div class="stat-mini">
                        <span class="stat-mini-value" id="totalDocs">0</span>
                        <span class="stat-mini-label">Documents</span>
                    </div>
                </div>
                <button class="btn-primary" onclick="showCreateModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Create Event
                </button>
            </div>
            
            <div class="events-grid" id="eventsGrid">
                <div class="empty-state">
                    <div class="empty-state-icon">📅</div>
                    <p>No events yet</p>
                    <p style="font-size: 0.85rem; color: var(--text-secondary);">Create your first event to get started</p>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Create Event Modal -->
    <div class="modal" id="createModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Event</h2>
                <button class="modal-close" onclick="hideCreateModal()">&times;</button>
            </div>
            <form class="modal-form" onsubmit="createEvent(event)">
                <div class="form-group">
                    <label for="eventName">Event Name *</label>
                    <input type="text" id="eventName" name="event_name" required placeholder="CES 2026">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="venue">Venue</label>
                        <input type="text" id="venue" name="venue" placeholder="Las Vegas Convention Center">
                    </div>
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" name="city" placeholder="Las Vegas">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="country">Country</label>
                        <input type="text" id="country" name="country" placeholder="USA">
                    </div>
                    <div class="form-group">
                        <label for="organizer">Organizer</label>
                        <input type="text" id="organizer" name="organizer" placeholder="CTA">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="startDate">Start Date</label>
                        <input type="date" id="startDate" name="start_date">
                    </div>
                    <div class="form-group">
                        <label for="endDate">End Date</label>
                        <input type="date" id="endDate" name="end_date">
                    </div>
                </div>
                <div class="form-group">
                    <label for="website">Website</label>
                    <input type="url" id="website" name="website" placeholder="https://www.ces.tech">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="hideCreateModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Create Event</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Edit Event Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Event</h2>
                <button class="modal-close" onclick="hideEditModal()">&times;</button>
            </div>
            <form class="modal-form" onsubmit="updateEvent(event)">
                <input type="hidden" id="editEventId">
                <div class="form-group">
                    <label for="editEventName">Event Name *</label>
                    <input type="text" id="editEventName" name="event_name" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editVenue">Venue</label>
                        <input type="text" id="editVenue" name="venue">
                    </div>
                    <div class="form-group">
                        <label for="editCity">City</label>
                        <input type="text" id="editCity" name="city">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editCountry">Country</label>
                        <input type="text" id="editCountry" name="country">
                    </div>
                    <div class="form-group">
                        <label for="editOrganizer">Organizer</label>
                        <input type="text" id="editOrganizer" name="organizer">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editStartDate">Start Date</label>
                        <input type="date" id="editStartDate" name="start_date">
                    </div>
                    <div class="form-group">
                        <label for="editEndDate">End Date</label>
                        <input type="date" id="editEndDate" name="end_date">
                    </div>
                </div>
                <div class="form-group">
                    <label for="editWebsite">Website</label>
                    <input type="url" id="editWebsite" name="website">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="hideEditModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let events = [];
        
        async function loadEvents() {
            try {
                const response = await fetch('/api/events');
                if (!response.ok) throw new Error('Failed to load events');
                events = await response.json();
                renderEvents();
                await loadStats();
            } catch (e) {
                console.error('Error loading events:', e);
            }
        }
        
        async function loadStats() {
            try {
                const response = await fetch('/api/events/stats');
                if (!response.ok) return;
                const stats = await response.json();
                document.getElementById('totalEvents').textContent = stats.total_events || 0;
                document.getElementById('activeEvents').textContent = stats.active_events || 0;
                document.getElementById('totalDocs').textContent = stats.total_documents || 0;
            } catch (e) {
                console.error('Error loading stats:', e);
            }
        }
        
        function renderEvents() {
            const grid = document.getElementById('eventsGrid');
            if (events.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📅</div>
                        <p>No events yet</p>
                        <p style="font-size: 0.85rem; color: var(--text-secondary);">Create your first event to get started</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = events.map(event => `
                <div class="event-card">
                    <div class="event-header">
                        <h3 class="event-name">${escapeHtml(event.event_name)}</h3>
                        <span class="event-status status-${event.status}">${event.status}</span>
                    </div>
                    <div class="event-details">
                        ${event.venue ? `<div class="event-detail"><span class="detail-icon">📍</span> ${escapeHtml(event.venue)}</div>` : ''}
                        ${event.city || event.country ? `<div class="event-detail"><span class="detail-icon">🌍</span> ${[event.city, event.country].filter(Boolean).join(', ')}</div>` : ''}
                        ${event.start_date ? `<div class="event-detail"><span class="detail-icon">📅</span> ${formatDate(event.start_date)}${event.end_date ? ' - ' + formatDate(event.end_date) : ''}</div>` : ''}
                        ${event.organizer ? `<div class="event-detail"><span class="detail-icon">🏢</span> ${escapeHtml(event.organizer)}</div>` : ''}
                    </div>
                    <div class="event-actions">
                        <a href="/events/${event.id}" class="btn-primary btn-sm">Open</a>
                        <button class="btn-secondary btn-sm" onclick="showEditModal(${event.id})">Edit</button>
                        <button class="btn-danger btn-sm" onclick="deleteEvent(${event.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        function showCreateModal() {
            document.getElementById('createModal').style.display = 'flex';
        }
        
        function hideCreateModal() {
            document.getElementById('createModal').style.display = 'none';
        }
        
        function showEditModal(id) {
            const event = events.find(e => e.id === id);
            if (!event) return;
            
            document.getElementById('editEventId').value = id;
            document.getElementById('editEventName').value = event.event_name || '';
            document.getElementById('editVenue').value = event.venue || '';
            document.getElementById('editCity').value = event.city || '';
            document.getElementById('editCountry').value = event.country || '';
            document.getElementById('editOrganizer').value = event.organizer || '';
            document.getElementById('editStartDate').value = event.start_date || '';
            document.getElementById('editEndDate').value = event.end_date || '';
            document.getElementById('editWebsite').value = event.website || '';
            
            document.getElementById('editModal').style.display = 'flex';
        }
        
        function hideEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        
        async function createEvent(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            
            try {
                const response = await fetch('/api/events', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) throw new Error('Failed to create event');
                
                hideCreateModal();
                form.reset();
                await loadEvents();
            } catch (err) {
                console.error('Error creating event:', err);
                alert('Failed to create event');
            }
        }
        
        async function updateEvent(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const id = document.getElementById('editEventId').value;
            
            try {
                const response = await fetch(`/api/events/${id}`, {
                    method: 'PUT',
                    body: formData
                });
                
                if (!response.ok) throw new Error('Failed to update event');
                
                hideEditModal();
                await loadEvents();
            } catch (err) {
                console.error('Error updating event:', err);
                alert('Failed to update event');
            }
        }
        
        async function deleteEvent(id) {
            if (!confirm('Are you sure you want to delete this event? All documents will be removed.')) return;
            
            try {
                const response = await fetch(`/api/events/${id}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) throw new Error('Failed to delete event');
                
                await loadEvents();
            } catch (err) {
                console.error('Error deleting event:', err);
                alert('Failed to delete event');
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
        
        loadEvents();
    </script>
    
    <style>
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .stats-row {
            display: flex;
            gap: 2rem;
        }
        
        .stat-mini {
            display: flex;
            flex-direction: column;
        }
        
        .stat-mini-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-mini-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.25rem;
        }
        
        .event-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid var(--surface-light);
            transition: all 0.2s;
        }
        
        .event-card:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
        }
        
        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        
        .event-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            margin: 0;
        }
        
        .event-status {
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-active {
            background: var(--success);
            color: white;
        }
        
        .status-completed {
            background: var(--text-secondary);
            color: white;
        }
        
        .status-cancelled {
            background: var(--error);
            color: white;
        }
        
        .event-details {
            margin-bottom: 1rem;
        }
        
        .event-detail {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
        }
        
        .detail-icon {
            width: 16px;
            text-align: center;
        }
        
        .event-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }
        
        .btn-danger {
            background: transparent;
            border: 1px solid var(--error);
            color: var(--error);
        }
        
        .btn-danger:hover {
            background: var(--error);
            color: white;
        }
        
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: var(--surface);
            border-radius: 12px;
            padding: 1.5rem;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .modal-header h2 {
            font-size: 1.25rem;
            margin: 0;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        
        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }
        
        .form-group label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .form-group input {
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            background: var(--bg);
            color: var(--text);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }
    </style>
</body>
</html>
