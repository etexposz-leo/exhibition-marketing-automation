<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Marketing Automation</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="user-bar">
                <div class="user-info" id="userInfo"><span class="user-email">Loading...</span></div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                <h1>Dashboard</h1>
            </div>
        </header>
        <main class="main-content">
            <section class="stats-grid">
                <div class="stat-card"><div class="stat-icon campaigns"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div><div class="stat-info"><span class="stat-value" id="total-campaigns">0</span><span class="stat-label">Total Campaigns</span></div></div>
                <div class="stat-card"><div class="stat-icon scheduled"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="stat-info"><span class="stat-value" id="scheduled-posts">0</span><span class="stat-label">Scheduled Posts</span></div></div>
                <div class="stat-card"><div class="stat-icon published"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div class="stat-info"><span class="stat-value" id="published-posts">0</span><span class="stat-label">Published Posts</span></div></div>
                <div class="stat-card"><div class="stat-icon failed"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div><div class="stat-info"><span class="stat-value" id="failed-posts">0</span><span class="stat-label">Failed Posts</span></div></div>
            </section>
            <section class="recent-activity">
                <h2>Recent Activity</h2>
                <div class="activity-list" id="activityList"><div class="loading">Loading...</div></div>
            </section>
        </main>
    </div>
    <script>
        async function checkAuth() {
            const response = await fetch('/api/auth/me');
            if (!response.ok) { window.location.href = '/login'; return null; }
            const data = await response.json();
            if (data.user) document.getElementById('userInfo').innerHTML = `<span class="user-email">${data.user.email}</span>`;
            return data.user;
        }
        async function logout() { await fetch('/api/auth/logout', { method: 'POST' }); window.location.href = '/login'; }
        async function loadDashboard() {
            const campaignsRes = await fetch('/api/campaigns');
            const campaigns = await campaignsRes.json();
            document.getElementById('total-campaigns').textContent = campaigns.length;
            
            const postsRes = await fetch('/api/scheduled-posts');
            const posts = await postsRes.json();
            document.getElementById('scheduled-posts').textContent = posts.filter(p => p.status === 'scheduled').length;
            document.getElementById('published-posts').textContent = posts.filter(p => p.status === 'published').length;
            document.getElementById('failed-posts').textContent = posts.filter(p => p.status === 'failed').length;
            
            const list = document.getElementById('activityList');
            if (posts.length === 0) { list.innerHTML = '<p>No recent activity.</p>'; return; }
            list.innerHTML = posts.slice(0, 10).map(p => `<div class="activity-item"><span class="activity-title">${p.platform} - ${p.status}</span></div>`).join('');
        }
        checkAuth();
        loadDashboard();
    </script>
</body>
</html>
