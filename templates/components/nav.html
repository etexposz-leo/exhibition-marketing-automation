<script>
// Highlight current nav item based on URL
function highlightCurrentNav() {
    const path = window.location.pathname;
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
        item.classList.remove('active');
        if (item.getAttribute('href') === path) {
            item.classList.add('active');
        }
    });
}

// Load user info
async function loadUserInfo() {
    try {
        const response = await fetch('/api/auth/me');
        if (!response.ok) {
            window.location.href = '/login';
            return;
        }
        const data = await response.json();
        if (data.user) {
            const nameEl = document.getElementById('userName');
            const emailEl = document.getElementById('userEmailSidebar');
            const avatarEl = document.getElementById('userAvatar');
            if (nameEl) nameEl.textContent = data.user.username || 'User';
            if (emailEl) emailEl.textContent = data.user.email || '';
            if (avatarEl) avatarEl.textContent = (data.user.username || 'U')[0].toUpperCase();
        }
    } catch (e) {
        console.error('Error loading user info:', e);
    }
}

// Logout
async function logout() {
    try {
        await fetch('/api/auth/logout', { method: 'POST' });
    } catch (e) {}
    window.location.href = '/login';
}

// Init nav
document.addEventListener('DOMContentLoaded', () => {
    highlightCurrentNav();
    loadUserInfo();
});
</script>
