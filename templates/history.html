<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Marketing Automation</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="user-bar">
                <div class="user-info" id="userInfo"><span class="user-email">Loading...</span></div>
                <a href="/" class="back-btn">Back to Home</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                <h1>Publishing History</h1>
            </div>
        </header>
        <main class="main-content">
            <div class="history-list" id="historyList">
                <div class="loading">Loading publishing history...</div>
            </div>
        </main>
    </div>
    <script>
        async function checkAuth() {
            const response = await fetch('/api/auth/me');
            if (!response.ok) { window.location.href = '/login'; return null; }
            const data = await response.json();
            if (data.user) document.getElementById('userInfo').innerHTML = `<span class="user-email">${data.user.email}</span>`;
            return data.user;
        }
        async function logout() { await fetch('/api/auth/logout', { method: 'POST' }); window.location.href = '/login'; }
        
        async function loadHistory() {
            try {
                const response = await fetch('/api/scheduled-posts');
                const posts = await response.json();
                const list = document.getElementById('historyList');
                
                if (posts.length === 0) {
                    list.innerHTML = '<p class="empty-state">No publishing history yet.</p>';
                    return;
                }
                
                list.innerHTML = posts.map(p => `
                    <div class="history-item">
                        <div class="history-platform">${p.platform}</div>
                        <div class="history-content">${p.content.substring(0, 100)}...</div>
                        <div class="history-status ${p.status}">${p.status}</div>
                        <div class="history-date">${p.published_at || p.scheduled_at || 'N/A'}</div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('historyList').innerHTML = '<p class="error">Failed to load history</p>';
            }
        }
        
        checkAuth();
        loadHistory();
    </script>
    <style>
        .history-list { display: flex; flex-direction: column; gap: 1rem; }
        .history-item { display: grid; grid-template-columns: 100px 1fr 100px 150px; gap: 1rem; padding: 1rem; background: var(--surface); border-radius: 8px; align-items: center; }
        .history-platform { font-weight: 600; text-transform: capitalize; }
        .history-content { color: var(--text-secondary); font-size: 0.9rem; }
        .history-status { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem; text-align: center; text-transform: capitalize; }
        .history-status.published { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .history-status.scheduled { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .history-status.failed { background: rgba(239, 68, 68, 0.2); color: var(--error); }
        .history-date { font-size: 0.85rem; color: var(--text-secondary); }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary); }
        .error { color: var(--error); padding: 2rem; text-align: center; }
    </style>
</body>
</html>
